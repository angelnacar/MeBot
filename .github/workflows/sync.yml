name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Asegúrate de que la URL coincida con tu tipo de repo (models, datasets o spaces)
          git push --force https://angelnacar:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/angelnacar/Mebot main
